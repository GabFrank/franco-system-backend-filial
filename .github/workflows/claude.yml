name: Claude Code Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude') && contains(join(github.event.issue.labels.*.name, ','), 'jira-auto')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: franco
          POSTGRES_PASSWORD: franco
          POSTGRES_DB: general
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings (GitHub Packages)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github-jsifenlib</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.PACKAGES_PAT}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          PACKAGES_PAT: ${{ secrets.PACKAGES_PAT }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-5-20250514
        env:
          SPRING_PROFILES_ACTIVE: ci
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/general
          SPRING_DATASOURCE_USERNAME: franco
          SPRING_DATASOURCE_PASSWORD: franco
          PACKAGES_PAT: ${{ secrets.PACKAGES_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
