spring.datasource.url=jdbc:postgresql://localhost:5552/general

# Esto puede ser:
# DEV (apunta al ambiente de desarrollo/test de SIFEN)
# PROD (apunta al ambiente de producción de SIFEN)
sifen.ambiente=PROD
sifen.enabled=true
sifen.scheduler.enabled=true 


# NO modificar a menos que uno sepa bien lo que está haciendo
# sifen.url_base=

# Si se va a usar el certificado cliente.
# Este valor en el 99.99% de las veces va a ser true
# a menos que uno sepa bien lo que está haciendo
sifen.certificado.usar=true
# Por ahora, el único valor aceptado es PFX
sifen.certificado.tipo=PFX

## RUTA APUNTANDO AL ARCHIVO PFX
sifen.certificado.archivo=/Users/gabfranck/workspace/frc-sistemas-informaticos/backend/filial/frc-filial-server/src/main/resources/certificados/certificado.pfx

## PASSWORD del ARCHIVO PFX
sifen.certificado.contrasena=fasa1701

## Nota técnica 13 (23/04/2023)
## Para habilitar los campos nuevos de esta nota técnica, cambiar a true
sifen.habilitar-nota-tecnica-13=true

## CSC
tipoContribuyenteEmisor=2

# Configuración de logs SIFEN - Reducir ruido de librerías externas
logging.level.com.roshka.sifen=WARN
logging.level.com.roshka.sifen.internal=WARN
logging.level.com.roshka.sifen.internal.helpers.SoapHelper=WARN
logging.level.com.roshka.sifen.internal.helpers.SSLContextHelper=WARN
logging.level.com.roshka.sifen.internal.request=WARN
logging.level.com.roshka.sifen.internal.request.BaseRequest=WARN
logging.level.com.roshka.sifen.internal.util.FrcVerificationLogger=WARN
# Mantener logs de nuestro código SIFEN
logging.level.com.franco.dev.service.sifen=INFO
sifen.scheduler.fixed-delay=100000
spring.devtools.restart.enabled=false
