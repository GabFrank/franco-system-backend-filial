#limite de cantidad movimiento stock para sumariar
calculoStockLimite = 100


spring.devtools.restart.enabled=false
spring.devtools.restart.exclude=static/**,public/**,templates/**,META-INF/**,resources/**

# Database Backup Configuration
backup.enabled=false
backup.local-path=/Users/gabfranck/Downloads
backup.google-drive.folder-id=
backup.google-drive.client-id=
backup.google-drive.client-secret=
backup.max-files=5
backup.backup-hour=9

# SIFEN Lote Configuration - Sistema de Lotes Asíncrono
# Intervalo de ejecución del scheduler en milisegundos (5 minutos por defecto)
sifen.scheduler.fixed-delay=300000

# Tamaño máximo de documentos electrónicos por lote (máximo permitido por SIFEN: 50)
sifen.lote.max-size=50

# Número máximo de reintentos por lote antes de marcarlo como ERROR_PERMANENTE
sifen.lote.max-retries=5

# Habilitar el procesamiento automático de lotes en segundo plano
sifen.scheduler.enabled=false



