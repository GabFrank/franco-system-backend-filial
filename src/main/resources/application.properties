# SIFEN Configuration - Now using rshk-jsifenlib library
# Configuration will be handled by SifenProperties and SifenConfig classes
# See sifen.properties file for detailed configuration
#dev tools
spring.devtools.restart.additional-exclude=logs/**
spring.devtools.livereload.enabled=true

# SIFEN Configuration - Using rshk-jsifenlib
sifen.enabled=false
sifen.ambiente=PROD
sifen.certificado.usar=true
sifen.certificado.tipo=PFX
sifen.certificado.archivo=${~/FRC/certificate.pfx}
# sifen.certificado.archivo=/Users/gabfranck/workspace/frc-sistemas-informaticos/backend/filial/frc-filial-server/src/main/resources/certificados/anatole_certificado.pfx

sifen.certificado.contrasena=${SIFEN_CERT_PASSWORD:fasa1701}
# sifen.certificado.contrasena=chelytiny
sifen.habilitar-nota-tecnica-13=true

ipServidorCentral=localhost:8081
spring.http.encoding.charset=UTF-8

# main database
spring.datasource.platform=postgres
spring.datasource.url=jdbc:postgresql://localhost:5551/general
spring.datasource.username=franco
spring.datasource.password=franco
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

#SQL
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none
spring.main.allow-bean-definition-overriding=true

# server port
server.port=8082
# server.address:0.0.0.0
#server.address=172.25.0.5


graphql.servlet.corsEnabled: true

sucursalId = 24
spring.main.lazy-initialization=true

#app.java.version=@project.version@
#updateRepository = https://github.com/GabFrank/franco-system-backend-filial/releases/download
app.version=@project.version@

facturaCountDown = 0
jarPath=/Users/gabfranck/Downloads/
#jarPath=/home/franco/FRC/frc-server

#biometricIp=192.168.1.3
#biometricPort=4370

spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

spring.flyway.baseline-version=1
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

#spring.flyway.baseline-on-migrate=false
#spring.flyway.clean-disabled=false
#logging.level.org.flywaydb=DEBUG

#limite de cantidad movimiento stock para sumariar
calculoStockLimite = 100


spring.devtools.restart.enabled=false
spring.devtools.restart.exclude=static/**,public/**,templates/**,META-INF/**,resources/**

# Database Backup Configuration
backup.enabled=false
backup.local-path=/Users/gabfranck/Downloads
backup.google-drive.folder-id=
backup.google-drive.client-id=
backup.google-drive.client-secret=
backup.max-files=5
backup.backup-hour=9

# SIFEN Lote Configuration - Sistema de Lotes Asíncrono
# Intervalo de ejecución del scheduler en milisegundos (5 minutos por defecto)
sifen.scheduler.fixed-delay=300000

# Tamaño máximo de documentos electrónicos por lote (máximo permitido por SIFEN: 50)
sifen.lote.max-size=50

# Número máximo de reintentos por lote antes de marcarlo como ERROR_PERMANENTE
sifen.lote.max-retries=5

# Habilitar el procesamiento automático de lotes en segundo plano
sifen.scheduler.enabled=false

# Actuator - Health checks and monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized

spring.application.name=frc-filial-server
