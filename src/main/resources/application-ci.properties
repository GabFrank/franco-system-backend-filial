# CI/CD profile — used by GitHub Actions
# Disables external services that are not available in CI

# Database (overridden by CI environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/general}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:franco}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:franco}

# Disable SIFEN (no certificates in CI)
sifen.enabled=false
sifen.scheduler.enabled=false

# Disable scheduled tasks
spring.main.lazy-initialization=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Actuator
management.endpoints.web.exposure.include=health,info
