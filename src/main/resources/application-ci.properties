# ============================================================================
# CI PROFILE — Used by GitHub Actions (SPRING_PROFILES_ACTIVE=ci)
# Disables external services not available in CI environment
# ============================================================================

# Database (overridable via env vars in workflow)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/general}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:franco}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:franco}

# Disable SIFEN (no certificates in CI)
sifen.enabled=false
sifen.ambiente=test

# Disable scheduled tasks
spring.main.lazy-initialization=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Actuator
management.endpoints.web.exposure.include=health,info
